<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics — Standalone Dev</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --color-bg: #0f1117;
        --color-surface: #1a1d27;
        --color-primary: #6366f1;
        --color-text: #e2e8f0;
        --color-text-muted: #94a3b8;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      html, body { height: 100%; font-family: var(--font-sans); background: var(--color-bg); color: var(--color-text); -webkit-font-smoothing: antialiased; }
      #root { height: 100%; display: flex; flex-direction: column; }
      #root:empty::after { content: ''; display: block; width: 40px; height: 40px; margin: 20vh auto 0; border: 3px solid transparent; border-top-color: var(--color-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
